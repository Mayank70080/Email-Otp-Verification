<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-page">
        <div class="img"></div>
        <div class="form">
            <h1 class="heading">Let us know <span>!</span></h1>
            <input type="email" placeholder="Email" autocomplete="off" id="email" required>
            <div class="pass-box">
                <input type="password" placeholder="Password" autocomplete="off" id="password" required>
                <img src="eye-close.png" id="showpass">
            </div>
            <button id="signinbtn">Sign In</button>
            <button id="signupbtn">Sign Up</button>
        </div>
    </div>
    <script src="login.js"></script>
</body>
</html>
